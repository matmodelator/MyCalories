<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini Calories</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 20px;
}

.app {
  max-width: 800px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

input, button {
  padding: 10px;
  font-size: 16px;
}

input {
  width: 100%;
  box-sizing: border-box;
  margin-bottom: 8px;
}

button {
  cursor: pointer;
  margin: 4px 0;
}

.top-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.top-buttons input {
  width: auto;
  flex: 1;
  min-width: 180px;
}

.total {
  background: #e8f2ff;
  padding: 12px;
  border-radius: 10px;
  margin-top: 16px;
  font-weight: bold;
}

.card {
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 12px;
  margin-top: 12px;
  background: #fafafa;
}

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 10;
}

.results-panel {
  position: fixed;
  top: 0;
  right: -360px;
  width: 340px;
  max-width: 90vw;
  height: 100vh;
  background: white;
  z-index: 20;
  box-shadow: -4px 0 18px rgba(0,0,0,0.25);
  transition: right 0.25s ease;
  overflow-y: auto;
  padding: 14px;
}

.results-panel.open {
  right: 0;
}

.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 10px;
  margin-bottom: 10px;
}

.result-item {
  border-bottom: 1px solid #eee;
  padding: 10px 0;
}

.result-main {
  display: flex;
  gap: 10px;
  align-items: center;
}

.result-main img {
  width: 52px;
  height: 52px;
  object-fit: contain;
  background: #f3f3f3;
  border-radius: 8px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  cursor: zoom-in;
}

/* Увеличение фото при наведении */
.result-main img:hover {
  transform: scale(2.8);
  position: relative;
  z-index: 50;
  background: white;
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
}

.result-title {
  font-weight: bold;
}

.result-brand {
  font-size: 13px;
  color: #666;
}

.result-meta {
  font-size: 12px;
  color: #555;
  margin-top: 3px;
}

.details {
  display: none;
  margin-top: 10px;
  background: #f8fafc;
  padding: 10px;
  border-radius: 8px;
  font-size: 14px;
}

.details.open {
  display: block;
}

.details input {
  margin-top: 8px;
}

.small-btn {
  margin-top: 8px;
  padding: 7px 10px;
  font-size: 14px;
}

.save-status {
  font-size: 13px;
  color: #2563eb;
  margin-top: 6px;
  margin-bottom: 8px;
}

#service-console {
  margin: 24px auto 0;
  max-width: 800px;
  background: #111827;
  color: white;
  padding: 8px 12px;
  font-size: 12px;
  border-radius: 8px 8px 0 0;
}

#build-down {
  max-width: 800px;
  margin: 0 auto;
  background: #1f2937;
  color: #d1d5db;
  padding: 6px 12px;
  font-size: 12px;
  border-radius: 0 0 8px 8px;
}
</style>
</head>

<body>

<div class="app">
  <h1>Mini Calories</h1>

  <label>Date</label>
  <input id="dateInput" type="date" onchange="changeDate()">

  <div class="top-buttons">
    <button onclick="saveDiary()">Save</button>
    <button onclick="clearCurrentDay()">Clear Day</button>
  </div>

  <div id="saveStatus" class="save-status"></div>

  <input id="searchInput" placeholder="Example: hummus, banana, cottage or barcode">

  <div class="top-buttons">
    <button onclick="searchByName()">Search by name</button>
    <button onclick="searchByBarcode()">Search by barcode</button>
  </div>

  <h2 id="dayTitle">Diary</h2>
  <div id="log"></div>

  <div class="total" id="totalBox">
    Calories: 0<br>
    Protein: 0 g<br>
    Fat: 0 g<br>
    Carbs: 0 g
  </div>
</div>

<div id="overlay" class="overlay" onclick="closePanel()"></div>

<div id="resultsPanel" class="results-panel">
  <div class="panel-header">
    <b>Search results</b>
    <button onclick="closePanel()">×</button>
  </div>

  <div id="searchProgress" class="save-status"></div>

 <input id="filterInput"
       placeholder="Add Tag"
       onkeydown="handleTagEnter(event)">

 <div class="top-buttons">
  <button id="searchToggleBtn" onclick="toggleFilter()">
    Start Filter
  </button>

  <button onclick="undoLastFilter()">Undo Filter</button>
  <button onclick="clearAllFilters()">Clear Filters</button>
</div>
  
  <div id="results"></div>

  <div class="top-buttons">
    <button onclick="showPrevious10()">Previous 10</button>
    <button onclick="showNext10()">Next 10</button>
  </div>
</div>

<script>
let products = [];
let currentPage = 0;
let searchStopped = false;
let filterActive = false;
let filterHistory = [];

// Основной объект дневника.
let diary = {};

let currentDate = "";

// Загрузка дневника из localStorage.
function loadDiary() {
  const saved = localStorage.getItem("miniCaloriesDiary");

  if (saved) {
    diary = JSON.parse(saved);
  } else {
    diary = {};
  }
}

// Сохранение дневника в localStorage.
function saveDiary() {
  localStorage.setItem("miniCaloriesDiary", JSON.stringify(diary));

  document.getElementById("saveStatus").innerText =
    "Saved locally in this browser";

  setTimeout(() => {
    document.getElementById("saveStatus").innerText = "";
  }, 2500);
}

// Установка текущей даты.
function initDate() {
  const today = new Date().toISOString().slice(0, 10);
  currentDate = today;
  document.getElementById("dateInput").value = today;

  if (!diary[currentDate]) {
    diary[currentDate] = {
      items: [],
      totals: {
        calories: 0,
        protein: 0,
        fat: 0,
        carbs: 0
      }
    };
  }

  renderDay();
}

// Переключение даты.
function changeDate() {
  currentDate = document.getElementById("dateInput").value;

  if (!diary[currentDate]) {
    diary[currentDate] = {
      items: [],
      totals: {
        calories: 0,
        protein: 0,
        fat: 0,
        carbs: 0
      }
    };
  }

  renderDay();
}

// Поиск по названию.
async function searchByName() {
  const query = document.getElementById("searchInput").value.trim();

  if (!query) {
    alert("Enter product name");
    return;
  }

  openPanel();

  products = [];
  filterHistory = [];
  currentPage = 0;
  searchStopped = false;
  filterActive = false;
  
  document.getElementById("searchToggleBtn").innerText = "Start Filter";
  document.getElementById("results").innerHTML = "";
  document.getElementById("searchProgress").innerText =
    "Searching... Found: 0";

  const url =
    "https://world.openfoodfacts.org/cgi/search.pl" +
    "?search_terms=" + encodeURIComponent(query) +
    "&search_simple=1" +
    "&action=process" +
    "&json=1" +
    "&page_size=50";

  const response = await fetch(url);

  if (searchStopped) return;

  const data = await response.json();

  if (searchStopped) return;

  products = data.products || [];

  renderResults();
}

// Поиск по штрихкоду.
async function searchByBarcode() {
  const barcode = document.getElementById("searchInput").value.trim();

  if (!barcode) {
    alert("Enter barcode");
    return;
  }

   openPanel();

  products = [];
  filterHistory = [];
  currentPage = 0;
  searchStopped = false;
  filterActive = false;

  document.getElementById("searchToggleBtn").innerText = "Start Filter";
  document.getElementById("results").innerHTML = "";
  document.getElementById("searchProgress").innerText =
    "Searching... Found: 0";

  const url =
    "https://world.openfoodfacts.org/api/v2/product/" +
    encodeURIComponent(barcode) +
    ".json";

  const response = await fetch(url);

  if (searchStopped) return;

  const data = await response.json();

  if (searchStopped) return;

  products = data.product ? [data.product] : [];

  renderResults();
}

// Остановка фильтра.
function toggleFilter() {
  filterActive = !filterActive;

  document.getElementById("searchToggleBtn").innerText =
    filterActive ? "Stop Filter" : "Start Filter";
}

function handleTagEnter(event) {
  if (event.key === "Enter") {
    if (!filterActive) {
      alert("Press Start Filter first");
      return;
    }

    applyFilter();
  }
}
  
// Добавление фильтра внутри уже найденного списка.
function applyFilter() {
  const filter = document
    .getElementById("criteriaInput")
    .value
    .trim()
    .toLowerCase();

  if (!filter) {
    alert("Enter filter");
    return;
  }

  filterHistory.push([...products]);

  products = products.filter(p => {
    const text = [
      p.product_name || "",
      p.brands || "",
      p.code || "",
      p.countries || "",
      p.origins || "",
      p.categories || "",
      p.ingredients_text || ""
    ].join(" ").toLowerCase();

    return text.includes(filter);
  });

  document.getElementById("criteriaInput").value = "";
  currentPage = 0;
  renderResults();
}

function undoLastFilter() {
  if (filterHistory.length === 0) return;

  products = filterHistory.pop();
  currentPage = 0;
  renderResults();
}

function clearAllFilters() {
  if (filterHistory.length === 0) return;

  products = filterHistory[0];
  filterHistory = [];
  currentPage = 0;
  renderResults();
}
  
// Следующие 10 результатов.
function showNext10() {
  if ((currentPage + 1) * 10 >= products.length) return;

  currentPage++;
  renderResults();
}

// Предыдущие 10 результатов.
function showPrevious10() {
  if (currentPage === 0) return;

  currentPage--;
  renderResults();
}

// Рисуем список найденных продуктов.
// Показываем только 10 вариантов на страницу.
function renderResults() {
  let html = "";

  const start = currentPage * 10;
  const end = start + 10;
  const visibleProducts = products.slice(start, end);

  if (visibleProducts.length === 0) {
    document.getElementById("results").innerHTML = "Nothing found";
    document.getElementById("searchProgress").innerText = "Found: 0";
    return;
  }

  document.getElementById("searchProgress").innerText =
    "Found: " + products.length +
    " / Showing: " + (start + 1) + "-" + Math.min(end, products.length);

  visibleProducts.forEach((p, localIndex) => {
    const index = start + localIndex;
    const n = p.nutriments || {};

    const name = p.product_name || "No name";
    const brand = p.brands || "";
    const image = p.image_front_small_url || "";
    const barcode = p.code || "";

    const countries = p.countries || "";
    const origins = p.origins || "";

    const calories = Number(n["energy-kcal_100g"] || 0);
    const protein = Number(n["proteins_100g"] || 0);
    const fat = Number(n["fat_100g"] || 0);
    const carbs = Number(n["carbohydrates_100g"] || 0);

    html += `
      <div class="result-item">

        <div class="result-main">
          ${image ? `<img src="${image}">` : `<img alt="">`}

          <div>
            <div class="result-title">${name}</div>
            <div class="result-brand">${brand || "-"}</div>

            <div class="result-meta">
              Countries: ${countries || "-"}<br>
              Origins: ${origins || "-"}
            </div>

            <button class="small-btn" onclick="toggleDetails(${index})">
              Details
            </button>
          </div>
        </div>

        <div id="details_${index}" class="details">
          Barcode: ${barcode || "-"}<br>
          Countries: ${countries || "-"}<br>
          Origins: ${origins || "-"}<br><br>

          Per 100 g:<br>
          Calories: ${calories}<br>
          Protein: ${protein} g<br>
          Fat: ${fat} g<br>
          Carbs: ${carbs} g<br>

          <input id="grams_${index}" type="number" value="100" min="1">

          <button onclick="addFood(${index})">
            Add
          </button>
        </div>

      </div>
    `;
  });

  document.getElementById("results").innerHTML = html;
}

// Открытие / закрытие деталей продукта.
function toggleDetails(index) {
  const box = document.getElementById("details_" + index);
  box.classList.toggle("open");
}

// Добавление еды в дневник.
function addFood(index) {
  const p = products[index];
  const n = p.nutriments || {};

  const grams = Number(document.getElementById("grams_" + index).value);

  if (!grams || grams <= 0) {
    alert("Enter grams");
    return;
  }

  const k = grams / 100;

  const item = {
    name: p.product_name || "No name",
    brand: p.brands || "",
    countries: p.countries || "",
    origins: p.origins || "",
    grams: grams,
    calories: Number(n["energy-kcal_100g"] || 0) * k,
    protein: Number(n["proteins_100g"] || 0) * k,
    fat: Number(n["fat_100g"] || 0) * k,
    carbs: Number(n["carbohydrates_100g"] || 0) * k
  };

  diary[currentDate].items.push(item);

  diary[currentDate].totals.calories += item.calories;
  diary[currentDate].totals.protein += item.protein;
  diary[currentDate].totals.fat += item.fat;
  diary[currentDate].totals.carbs += item.carbs;

  renderDay();
  closePanel();
}

// Рисуем дневник выбранной даты.
function renderDay() {
  document.getElementById("dayTitle").innerText = "Diary: " + currentDate;

  let html = "";

  diary[currentDate].items.forEach(item => {
    html += `
      <div class="card">
        <b>${item.name}</b> — ${item.grams} g<br>
        ${item.brand ? item.brand + "<br>" : ""}
        ${item.countries ? "Countries: " + item.countries + "<br>" : ""}
        ${item.origins ? "Origins: " + item.origins + "<br>" : ""}
        ${round(item.calories)} kcal,
        P: ${round(item.protein)} g,
        F: ${round(item.fat)} g,
        C: ${round(item.carbs)} g
      </div>
    `;
  });

  document.getElementById("log").innerHTML = html;
  updateTotals();
}

// Обновление итогов.
function updateTotals() {
  const totals = diary[currentDate].totals;

  document.getElementById("totalBox").innerHTML = `
    Calories: ${round(totals.calories)}<br>
    Protein: ${round(totals.protein)} g<br>
    Fat: ${round(totals.fat)} g<br>
    Carbs: ${round(totals.carbs)} g
  `;
}

// Очистка текущего дня.
function clearCurrentDay() {
  if (!confirm("Clear this day?")) return;

  diary[currentDate] = {
    items: [],
    totals: {
      calories: 0,
      protein: 0,
      fat: 0,
      carbs: 0
    }
  };

  renderDay();
}

// Открываем боковую панель.
function openPanel() {
  document.getElementById("overlay").style.display = "block";
  document.getElementById("resultsPanel").classList.add("open");
}

// Закрываем боковую панель.
function closePanel() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("resultsPanel").classList.remove("open");
}

// Округление чисел.
function round(n) {
  return Math.round(n * 10) / 10;
}

// Старт приложения.
loadDiary();
initDate();
</script>

<!-- ========================================
     SERVICE CONSOLE
======================================== -->

<div id="service-console">
Add Undo\Clear  | v3.3.5
</div>

<div class="row" id="build-down">
deploy: --
</div>

<script>
(function () {
  const now = new Date();

  const pad = n =>
    String(n).padStart(2, "0");

  const date =
      pad(now.getDate())
    + "."
    + pad(now.getMonth() + 1)
    + "."
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ":"
    + pad(now.getMinutes());

  document
    .getElementById("build-down")
    .textContent =
      "deploy: "
      + date
      + " "
      + time;
})();
</script>

</body>
</html>
