<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini Calories</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 20px;
}

.app {
  max-width: 800px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

input, button {
  padding: 10px;
  font-size: 16px;
}

input {
  width: 100%;
  box-sizing: border-box;
  margin-bottom: 8px;
}

button {
  cursor: pointer;
  margin: 4px 0;
}

.top-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.total {
  background: #e8f2ff;
  padding: 12px;
  border-radius: 10px;
  margin-top: 16px;
  font-weight: bold;
}

.card {
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 12px;
  margin-top: 12px;
  background: #fafafa;
}

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 10;
}

.results-panel {
  position: fixed;
  top: 0;
  right: -380px;
  width: 360px;
  max-width: 92vw;
  height: 100vh;
  background: white;
  z-index: 20;
  box-shadow: -4px 0 18px rgba(0,0,0,0.25);
  transition: right 0.25s ease;
  overflow-y: auto;
  padding: 14px;
}

.results-panel.open {
  right: 0;
}

.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 10px;
  margin-bottom: 10px;
}

.result-item {
  border-bottom: 1px solid #eee;
  padding: 10px 0;
}

.result-main {
  display: flex;
  gap: 10px;
  align-items: center;
}

.result-main img {
  width: 52px;
  height: 52px;
  object-fit: contain;
  background: #f3f3f3;
  border-radius: 8px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  cursor: zoom-in;
}

/* Увеличение фото при наведении */
.result-main img:hover {
  transform: scale(2.8);
  z-index: 50;
  position: relative;
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  background: white;
}

.result-title {
  font-weight: bold;
}

.result-brand {
  font-size: 13px;
  color: #666;
}

.result-meta {
  font-size: 12px;
  color: #555;
  margin-top: 3px;
}

.details {
  display: none;
  margin-top: 10px;
  background: #f8fafc;
  padding: 10px;
  border-radius: 8px;
  font-size: 14px;
}

.details.open {
  display: block;
}

.details input {
  margin-top: 8px;
}

.small-btn {
  margin-top: 8px;
  padding: 7px 10px;
  font-size: 14px;
}

.save-status {
  font-size: 13px;
  color: #2563eb;
  margin-top: 6px;
}
</style>
</head>

<body>

<div class="app">
  <h1>Mini Calories</h1>

  <label>Date</label>
  <input id="dateInput" type="date" onchange="changeDate()">

  <div class="top-buttons">
    <button onclick="saveDiary()">Save</button>
    <button onclick="clearCurrentDay()">Clear Day</button>
  </div>

  <div id="saveStatus" class="save-status"></div>

  <input id="searchInput" placeholder="Example: hummus, banana, cottage">
  <button onclick="searchProducts()">Search</button>

  <h2 id="dayTitle">Diary</h2>
  <div id="log"></div>

  <div class="total" id="totalBox">
    Calories: 0<br>
    Protein: 0 g<br>
    Fat: 0 g<br>
    Carbs: 0 g
  </div>
</div>

<div id="overlay" class="overlay" onclick="closePanel()"></div>

<div id="resultsPanel" class="results-panel">
  <div class="panel-header">
    <b>Search results</b>
    <button onclick="closePanel()">×</button>
  </div>

  <div id="results"></div>
</div>

<script>
let products = [];

// Основной объект дневника.
// Ключ — дата, значение — список еды и итоги за день.
let diary = {};

let currentDate = "";

// Загружаем сохраненный дневник из браузера.
function loadDiary() {
  const saved = localStorage.getItem("miniCaloriesDiary");

  if (saved) {
    diary = JSON.parse(saved);
  } else {
    diary = {};
  }
}

// Сохраняем дневник локально в браузер.
function saveDiary() {
  localStorage.setItem("miniCaloriesDiary", JSON.stringify(diary));

  document.getElementById("saveStatus").innerText =
    "Saved locally in this browser";

  setTimeout(() => {
    document.getElementById("saveStatus").innerText = "";
  }, 2500);
}

// Устанавливаем текущую дату.
function initDate() {
  const today = new Date().toISOString().slice(0, 10);
  currentDate = today;
  document.getElementById("dateInput").value = today;

  ensureDay(currentDate);
  renderDay();
}

// Проверяем, есть ли день в дневнике.
// Если нет — создаем пустой день.
function ensureDay(date) {
  if (!diary[date]) {
    diary[date] = {
      items: [],
      totals: {
        calories: 0,
        protein: 0,
        fat: 0,
        carbs: 0
      }
    };
  }
}

// Переключение даты через календарь.
function changeDate() {
  currentDate = document.getElementById("dateInput").value;
  ensureDay(currentDate);
  renderDay();
}

// Запрос продуктов из Open Food Facts.
async function searchProducts() {
  const query = document.getElementById("searchInput").value.trim();

  if (!query) {
    alert("Enter product name");
    return;
  }

  openPanel();
  document.getElementById("results").innerHTML = "Loading...";

  const url =
    "https://world.openfoodfacts.org/cgi/search.pl" +
    "?search_terms=" + encodeURIComponent(query) +
    "&search_simple=1" +
    "&action=process" +
    "&json=1" +
    "&page_size=20";

  const response = await fetch(url);
  const data = await response.json();

  products = data.products || [];

  if (products.length === 0) {
    document.getElementById("results").innerHTML = "Nothing found";
    return;
  }

  renderResults();
}

// Рисуем список найденных продуктов в боковой панели.
function renderResults() {
  let html = "";

  products.forEach((p, index) => {
    const n = p.nutriments || {};

    const name = p.product_name || "No name";
    const brand = p.brands || "";
    const image = p.image_front_small_url || "";
    const barcode = p.code || "";

    const countries = p.countries || "";
    const origins = p.origins || "";

    const calories = Number(n["energy-kcal_100g"] || 0);
    const protein = Number(n["proteins_100g"] || 0);
    const fat = Number(n["fat_100g"] || 0);
    const carbs = Number(n["carbohydrates_100g"] || 0);

    html += `
      <div class="result-item">

        <div class="result-main">
          ${image ? `<img src="${image}" alt="">` : `<img alt="">`}

          <div>
            <div class="result-title">${name}</div>
            <div class="result-brand">${brand || "-"}</div>

            <div class="result-meta">
              Countries: ${countries || "-"}<br>
              Origins: ${origins || "-"}
            </div>

            <button class="small-btn" onclick="toggleDetails(${index})">
              Details
            </button>
          </div>
        </div>

        <div id="details_${index}" class="details">
          Barcode: ${barcode || "-"}<br>
          Countries: ${countries || "-"}<br>
          Origins: ${origins || "-"}<br><br>

          Per 100 g:<br>
          Calories: ${calories}<br>
          Protein: ${protein} g<br>
          Fat: ${fat} g<br>
          Carbs: ${carbs} g<br>

          <input id="grams_${index}" type="number" value="100" min="1">

          <button onclick="addFood(${index})">
            Add
          </button>
        </div>

      </div>
    `;
  });

  document.getElementById("results").innerHTML = html;
}

// Открыть / закрыть подробности продукта.
function toggleDetails(index) {
  const box = document.getElementById("details_" + index);
  box.classList.toggle("open");
}

// Добавляем выбранный продукт в дневник выбранной даты.
function addFood(index) {
  const p = products[index];
  const n = p.nutriments || {};

  const grams = Number(document.getElementById("grams_" + index).value);

  if (!grams || grams <= 0) {
    alert("Enter grams");
    return;
  }

  const k = grams / 100;

  const item = {
    name: p.product_name || "No name",
    brand: p.brands || "",
    countries: p.countries || "",
    origins: p.origins || "",
    grams: grams,
    calories: Number(n["energy-kcal_100g"] || 0) * k,
    protein: Number(n["proteins_100g"] || 0) * k,
    fat: Number(n["fat_100g"] || 0) * k,
    carbs: Number(n["carbohydrates_100g"] || 0) * k
  };

  ensureDay(currentDate);

  diary[currentDate].items.push(item);

  diary[currentDate].totals.calories += item.calories;
  diary[currentDate].totals.protein += item.protein;
  diary[currentDate].totals.fat += item.fat;
  diary[currentDate].totals.carbs += item.carbs;

  renderDay();
  closePanel();
}

// Рисуем дневник выбранной даты.
function renderDay() {
  ensureDay(currentDate);

  document.getElementById("dayTitle").innerText = "Diary: " + currentDate;

  let html = "";

  diary[currentDate].items.forEach(item => {
    html += `
      <div class="card">
        <b>${item.name}</b> — ${item.grams} g<br>
        ${item.brand ? item.brand + "<br>" : ""}
        ${item.countries ? "Countries: " + item.countries + "<br>" : ""}
        ${item.origins ? "Origins: " + item.origins + "<br>" : ""}
        ${round(item.calories)} kcal,
        P: ${round(item.protein)} g,
        F: ${round(item.fat)} g,
        C: ${round(item.carbs)} g
      </div>
    `;
  });

  document.getElementById("log").innerHTML = html;
  updateTotals();
}

// Обновляем дневные итоги.
function updateTotals() {
  const totals = diary[currentDate].totals;

  document.getElementById("totalBox").innerHTML = `
    Calories: ${round(totals.calories)}<br>
    Protein: ${round(totals.protein)} g<br>
    Fat: ${round(totals.fat)} g<br>
    Carbs: ${round(totals.carbs)} g
  `;
}

// Очистка текущего дня.
function clearCurrentDay() {
  if (!confirm("Clear this day?")) return;

  diary[currentDate] = {
    items: [],
    totals: {
      calories: 0,
      protein: 0,
      fat: 0,
      carbs: 0
    }
  };

  renderDay();
}

// Открываем боковую панель.
function openPanel() {
  document.getElementById("overlay").style.display = "block";
  document.getElementById("resultsPanel").classList.add("open");
}

// Закрываем боковую панель.
function closePanel() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("resultsPanel").classList.remove("open");
}

// Округление чисел.
function round(n) {
  return Math.round(n * 10) / 10;
}

// Старт приложения.
loadDiary();
initDate();
</script>





<!-- ========================================
     SERVICE CONSOLE
     Верхняя строка редактируется вручную
     Здесь задается:
     - название страницы
     - номер версии
======================================== -->

<div id="service-console">

интерфейс на английском, но комментарии в коде на русском; кнопка Save пишет дневник в localStorage, при загрузке страница читает сохраненное; фото увеличивается при наведении | v3.0.0
  </div>

  <div class="row" id="build-down">
    deploy: --
  </div>

</div>

<!-- ========================================
     SCRIPT
     Автоматически выводит:
     - дату
     - время
     Момент загрузки страницы
======================================== -->

<script>
(function () {
  const now = new Date();

  const pad = n =>
    String(n).padStart(2, "0");

  const date =
      pad(now.getDate())
    + "."
    + pad(now.getMonth() + 1)
    + "."
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ":"
    + pad(now.getMinutes());

  document
    .getElementById("build-down")
    .textContent =
      "deploy: "
      + date
      + " "
      + time;
})();
</script>


</body>
</html>
